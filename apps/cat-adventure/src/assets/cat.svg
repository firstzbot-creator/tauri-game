<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Body -->
  <ellipse cx="32" cy="40" rx="16" ry="14" fill="#FF9933"/>
  <!-- Head -->
  <circle cx="32" cy="22" r="14" fill="#FF9933"/>
  <!-- Left ear -->
  <polygon points="20,12 16,0 26,8" fill="#FF9933"/>
  <polygon points="21,11 18,3 25,9" fill="#FFB366"/>
  <!-- Right ear -->
  <polygon points="44,12 48,0 38,8" fill="#FF9933"/>
  <polygon points="43,11 46,3 39,9" fill="#FFB366"/>
  <!-- Eyes -->
  <ellipse cx="26" cy="20" rx="3" ry="3.5" fill="#333"/>
  <ellipse cx="38" cy="20" rx="3" ry="3.5" fill="#333"/>
  <circle cx="27" cy="19" r="1" fill="#fff"/>
  <circle cx="39" cy="19" r="1" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="32" cy="26" rx="2" ry="1.5" fill="#FF6666"/>
  <!-- Mouth -->
  <path d="M30,28 Q32,31 34,28" fill="none" stroke="#333" stroke-width="0.8"/>
  <!-- Whiskers -->
  <line x1="10" y1="24" x2="24" y2="25" stroke="#333" stroke-width="0.6"/>
  <line x1="10" y1="28" x2="24" y2="27" stroke="#333" stroke-width="0.6"/>
  <line x1="40" y1="25" x2="54" y2="24" stroke="#333" stroke-width="0.6"/>
  <line x1="40" y1="27" x2="54" y2="28" stroke="#333" stroke-width="0.6"/>
  <!-- Tail -->
  <path d="M48,42 Q58,30 52,20" fill="none" stroke="#FF9933" stroke-width="4" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="22" cy="52" rx="5" ry="3" fill="#FFB366"/>
  <ellipse cx="42" cy="52" rx="5" ry="3" fill="#FFB366"/>
</svg>
